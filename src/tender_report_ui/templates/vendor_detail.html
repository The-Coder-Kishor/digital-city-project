<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ vendor.vendor_name }} · Vendor</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1b33; --ink:#e5e7eb; --muted:#9ca3af; --line:#24324f; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Arial; background: radial-gradient(1000px 500px at 20% 0%, #13244a, var(--bg)); color:var(--ink); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
    .card { background: rgba(15, 27, 51, 0.9); border:1px solid var(--line); border-radius:14px; padding:14px; }
    a { color: #93c5fd; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .meta { color: var(--muted); font-size: 0.92rem; }
    table { width:100%; border-collapse: collapse; }
    td, th { border-bottom:1px solid var(--line); padding:10px 6px; text-align:left; vertical-align:top; }
    th { color:#cbd5e1; font-weight:600; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid var(--line); border-radius:999px; color:var(--muted); font-size:0.82rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <div>
      <div class="meta"><a href="/vendors">← back to vendors</a></div>
      <h1 style="margin:6px 0 4px;">{{ vendor.vendor_name }}</h1>
      <div class="meta"><span class="pill">{{ vendor.tender_count }} tenders</span></div>
    </div>

    <section class="card" style="margin-top:14px;">
      <h2 style="margin:0 0 8px;">Tenders under this vendor</h2>
      <table>
        <thead><tr><th>Tender</th><th>Title</th></tr></thead>
        <tbody>
          {% for t in vendor.tenders %}
          <tr>
            <td><a href="/t/{{ t.tender_id }}">{{ t.tender_id }}</a></td>
            <td>{{ t.tender_title }}</td>
          </tr>
          {% else %}
          <tr><td colspan="2" class="meta">No tenders found for this vendor.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
