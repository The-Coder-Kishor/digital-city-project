<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vendors · Tender Report UI</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1b33; --ink:#e5e7eb; --muted:#9ca3af; --line:#24324f; }
    body { margin:0; font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Arial; background: radial-gradient(1000px 500px at 20% 0%, #13244a, var(--bg)); color:var(--ink); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .card { background: rgba(15, 27, 51, 0.9); border:1px solid var(--line); border-radius:14px; padding:14px; }
    a { color: #93c5fd; text-decoration:none; }
    a:hover { text-decoration:underline; }
    input { background:#0b152b; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px 12px; min-width: 320px; }
    button { background: #1f9d55; color:white; border:0; border-radius:10px; padding:10px 12px; cursor:pointer; }
    .meta { color: var(--muted); font-size: 0.92rem; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid var(--line); border-radius:999px; color:var(--muted); font-size:0.82rem; }
    table { width:100%; border-collapse: collapse; }
    td, th { border-bottom:1px solid var(--line); padding:10px 6px; text-align:left; vertical-align:top; }
    th { color:#cbd5e1; font-weight:600; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="row" style="justify-content:space-between;">
      <div>
        <div class="meta"><a href="/">← back</a></div>
        <h1 style="margin:6px 0 4px;">Vendor Explorer</h1>
        <div class="meta">Search vendors and open tenders associated with each vendor.</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <form class="row" method="get" action="/vendors">
        <input name="q" value="{{ q }}" placeholder="Search vendor name..." />
        <button type="submit">Search</button>
        <span class="pill">{{ vendors | length }} vendors</span>
      </form>
    </div>

    <div class="card" style="margin-top:14px;">
      <table>
        <thead>
          <tr>
            <th>Vendor</th>
            <th>Tenders</th>
            <th>Tender IDs</th>
          </tr>
        </thead>
        <tbody>
          {% for v in vendors %}
          <tr>
            <td><a href="/vendor/{{ v.vendor_name | urlencode }}">{{ v.vendor_name }}</a></td>
            <td><span class="pill">{{ v.tender_count }}</span></td>
            <td class="meta">{{ v.tender_ids | join(', ') }}</td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="meta">No vendors found for this query.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
